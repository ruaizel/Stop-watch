<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos | Minimalist Stopwatch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Lucide Icons for premium feel -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="container" id="stopwatch-container">
        <h1>Precision Timer</h1>

        <div id="display">
            <div class="time-unit">
                <span id="hrs">00</span>
                <span class="time-label">hrs</span>
            </div>
            <span>:</span>
            <div class="time-unit">
                <span id="mins">00</span>
                <span class="time-label">min</span>
            </div>
            <span>:</span>
            <div class="time-unit">
                <span id="secs">00</span>
                <span class="time-label">sec</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn-start" title="Start">
                <i data-lucide="play"></i>
            </button>
            <button class="btn-pause" title="Pause">
                <i data-lucide="pause"></i>
            </button>
            <button class="btn-reset" title="Reset">
                <i data-lucide="rotate-ccw"></i>
            </button>
        </div>

    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        let seconds = 0;
        let interval = null;
        const container = document.getElementById('stopwatch-container');
        const hrsDisplay = document.getElementById("hrs");
        const minsDisplay = document.getElementById("mins");
        const secsDisplay = document.getElementById("secs");

        function updateDisplay() {
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;

            hrsDisplay.innerText = String(h).padStart(2, '0');
            minsDisplay.innerText = String(m).padStart(2, '0');
            secsDisplay.innerText = String(s).padStart(2, '0');
        }

        function startTimer() {
            if (interval) return;

            console.log("Timer started");
            container.classList.add('running');
            interval = setInterval(() => {
                seconds++;
                updateDisplay();
            }, 1000);
        }

        function pauseTimer() {
            console.log("Timer paused, interval ID:", interval);
            if (interval) {
                clearInterval(interval);
                interval = null;
                container.classList.remove('running');
            }
        }

        function resetTimer() {
            console.log("Timer reset");
            pauseTimer();
            seconds = 0;
            updateDisplay();
        }

        // Use event listeners for better reliability
        document.querySelector('.btn-start').addEventListener('click', startTimer);
        document.querySelector('.btn-pause').addEventListener('click', pauseTimer);
        document.querySelector('.btn-reset').addEventListener('click', resetTimer);
    </script>


</body>

</html>
